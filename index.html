<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>桃園第三航廈施工日報</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b1220;
color:#e5e7eb;
}

.hero{
position:relative;
height:180px;
background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("plane.jpg") center/cover;
display:flex;
align-items:flex-end;
padding:20px;
border-bottom:2px solid #1e293b;
}

.hero-title{
font-size:22px;
font-weight:700;
}

.container{
max-width:720px;
margin:auto;
padding:16px;
}

.section{
background:#111827;
border:1px solid #1f2937;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 4px 20px rgba(0,0,0,.35);
}

.section-title{
font-size:16px;
font-weight:600;
margin-bottom:10px;
color:#38bdf8;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1f2937;
background:#020617;
color:#f1f5f9;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.kpi-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:12px;
}

.kpi{
background:#020617;
border-radius:10px;
padding:16px;
text-align:center;
border:1px solid #1f2937;
}

.kpi-number{
font-size:28px;
font-weight:700;
margin-top:4px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0284c7;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#0369a1;
}

.list-card{
background:#020617;
padding:12px;
border-radius:10px;
border:1px solid #1f2937;
margin-bottom:10px;
}

.msg{
display:none;
padding:10px;
border-radius:8px;
margin-top:8px;
font-size:13px;
}

.msg.show{display:block}

.msg.ok{background:#065f46}
.msg.err{background:#7f1d1d}

.loading{
display:none;
text-align:center;
padding:10px;
}

.loading.show{
display:block;
}

</style>
</head>

<body>

<div class="hero">
<div class="hero-title">桃園第三航廈｜機電工程施工日報</div>
</div>

<div class="container">

<div id="loading" class="loading">Loading...</div>

<!-- 填報 -->

<div class="section">

<div class="section-title">基本資料</div>

<input id="date" type="date">
<input id="reporter" placeholder="填報人">
<input id="area" placeholder="施工區域">
<textarea id="workItem" placeholder="今日施工項目"></textarea>
<textarea id="issue" placeholder="Issue"></textarea>

</div>


<div class="section">

<div class="section-title">人力</div>

<div class="grid">

<input id="directConstruction" type="number" placeholder="點工施工">
<input id="measuredConstruction" type="number" placeholder="計價施工">

<input id="directTransport" type="number" placeholder="點工運輸">
<input id="measuredTransport" type="number" placeholder="計價運輸">

<input id="directManagement" type="number" placeholder="點工管理">
<input id="measuredManagement" type="number" placeholder="計價管理">

<input id="directOther" type="number" placeholder="點工其他">
<input id="measuredOther" type="number" placeholder="計價其他">

</div>

<div class="grid">

<input id="workStart" type="time">
<input id="workEnd" type="time">

</div>

</div>


<div class="section">

<div class="section-title">加班</div>

<div class="grid">

<input id="otDirect" type="number" placeholder="點工">
<input id="otMeasured" type="number" placeholder="計價">

<input id="otStart" type="time">
<input id="otEnd" type="time">

</div>

</div>


<div class="section">

<div class="section-title">車輛 / 機具</div>

<div id="vehicles"></div>

<button onclick="addVehicle()">新增車輛</button>

</div>


<div class="section">

<div class="section-title">材料（自購）</div>

<div id="materials"></div>

<button onclick="addMaterial()">新增材料</button>

</div>


<button onclick="save()">儲存</button>

<div id="formMsg" class="msg"></div>



<!-- 總覽 -->

<div class="section">

<div class="section-title">總覽查詢</div>

<input id="queryDate" type="date">

<button onclick="loadOverview()">查詢</button>

</div>


<div id="overview" class="section" style="display:none">

<div class="section-title">當日資訊</div>

<div class="kpi-grid">

<div class="kpi">
<div>當日點工</div>
<div id="kpiDirect" class="kpi-number">0</div>
</div>

<div class="kpi">
<div>當日計價</div>
<div id="kpiMeasured" class="kpi-number">0</div>
</div>

<div class="kpi">
<div>累計點工</div>
<div id="kpiCumDirect" class="kpi-number">0</div>
</div>

<div class="kpi">
<div>累計計價</div>
<div id="kpiCumMeasured" class="kpi-number">0</div>
</div>

</div>

<div id="infoCard" class="list-card"></div>

<div id="vehicleCard"></div>

<div id="materialCard"></div>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwvw1fyJ56kGHiPB_aupVxxoVTaUbd0QmX8EQnxrk7sgjgZaS65WPy3KmuFR_wWJhNh/exec";


function addVehicle(){

const el=document.createElement("div");

el.className="list-card";

el.innerHTML=`
<input class="type" placeholder="車種">
<input class="qty" type="number" placeholder="數量">
<input class="workers" type="number" placeholder="作業人數">
`;

vehicles.appendChild(el);

}

function addMaterial(){

const el=document.createElement("div");

el.className="list-card";

el.innerHTML=`
<input class="name" placeholder="材料名稱">
<input class="spec" placeholder="規格">
<input class="unit" placeholder="單位">
<input class="qty" type="number" placeholder="數量">
`;

materials.appendChild(el);

}

function intVal(v){

const n=Number(v);

return isNaN(n)?0:n;

}


function collectVehicles(){

return [...vehicles.children].map(v=>({

type:v.querySelector(".type").value,
qty:intVal(v.querySelector(".qty").value),
workers:intVal(v.querySelector(".workers").value)

})).filter(v=>v.type);

}


function collectMaterials(){

return [...materials.children].map(m=>({

name:m.querySelector(".name").value,
spec:m.querySelector(".spec").value,
unit:m.querySelector(".unit").value,
qty:intVal(m.querySelector(".qty").value)

})).filter(m=>m.name);

}



async function save(){

loading.classList.add("show");

const payload={

action:"createReport",

date:date.value,
reporter:reporter.value,
area:area.value,
workItem:workItem.value,
issue:issue.value,

directConstruction:directConstruction.value,
directTransport:directTransport.value,
directManagement:directManagement.value,
directOther:directOther.value,

measuredConstruction:measuredConstruction.value,
measuredTransport:measuredTransport.value,
measuredManagement:measuredManagement.value,
measuredOther:measuredOther.value,

workStart:workStart.value,
workEnd:workEnd.value,

otDirect:otDirect.value,
otMeasured:otMeasured.value,
otStart:otStart.value,
otEnd:otEnd.value,

vehicles:JSON.stringify(collectVehicles()),
materials:JSON.stringify(collectMaterials())

};

try{

let res=await fetch(API_URL,{
method:"POST",
body:new URLSearchParams(payload)
});

let json=await res.json();

if(!json.ok && json.message==="date_exists"){

if(confirm("已填過 是否覆蓋")){

payload.action="updateReport";

await fetch(API_URL,{
method:"POST",
body:new URLSearchParams(payload)
});

}

}

formMsg.className="msg ok show";
formMsg.innerText="儲存成功";

}catch(e){

formMsg.className="msg err show";
formMsg.innerText="儲存失敗";

}

loading.classList.remove("show");

}



async function loadOverview(){

loading.classList.add("show");

const res=await fetch(API_URL+"?action=getReport&date="+queryDate.value);

const json=await res.json();

loading.classList.remove("show");

if(!json.exists){

alert("無資料");

return;

}

const d=json.data;

overview.style.display="block";

kpiDirect.innerText=d.dailyDirectTotal;
kpiMeasured.innerText=d.dailyMeasuredTotal;
kpiCumDirect.innerText=d.cumDirectTotal;
kpiCumMeasured.innerText=d.cumMeasuredTotal;

infoCard.innerHTML=`
<b>日期</b> ${d.date}<br>
<b>填報人</b> ${d.reporter}<br>
<b>區域</b> ${d.area}<br>
<b>施工</b> ${d.workItem}
`;

vehicleCard.innerHTML="<div class='section-title'>車輛</div>";

if(d.vehicles.length){

d.vehicles.forEach(v=>{
vehicleCard.innerHTML+=`
<div class="list-card">
${v.type} ｜ ${v.qty} 台 ｜ ${v.workers} 人
</div>
`;
});

}else{

vehicleCard.innerHTML+="無資料";

}


materialCard.innerHTML="<div class='section-title'>材料</div>";

if(d.materials.length){

d.materials.forEach(m=>{
materialCard.innerHTML+=`
<div class="list-card">
${m.name} ${m.spec} ${m.qty}${m.unit}
</div>
`;
});

}else{

materialCard.innerHTML+="無資料";

}

}

</script>

</body>
</html>
