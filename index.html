<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>桃園第三航廈施工日報</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b1220;
color:#e5e7eb;
}

header{
background:#020617;
padding:16px;
text-align:center;
font-size:20px;
font-weight:600;
letter-spacing:1px;
border-bottom:2px solid #1e293b;
}

.container{
max-width:720px;
margin:auto;
padding:16px;
}

.card{
background:#111827;
border:1px solid #1f2937;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.card-title{
font-size:16px;
font-weight:600;
margin-bottom:10px;
color:#38bdf8;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1f2937;
background:#020617;
color:#f1f5f9;
font-size:14px;
}

input:focus,textarea:focus{
outline:none;
border-color:#38bdf8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0284c7;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#0369a1;
}

.vehicle-item,
.material-item{
background:#020617;
padding:12px;
border-radius:8px;
margin-bottom:10px;
border:1px solid #1f2937;
}

.list{
background:#020617;
border-radius:8px;
padding:12px;
line-height:1.7;
font-size:14px;
}

.msg{
padding:10px;
border-radius:8px;
margin-top:8px;
font-size:13px;
display:none;
}

.msg.show{display:block;}

.msg.err{background:#7f1d1d}
.msg.ok{background:#065f46}
.msg.info{background:#1e3a8a}

.loading{
display:none;
text-align:center;
padding:10px;
font-size:14px;
}

.loading.show{
display:block;
}

</style>

</head>


<body>

<header>
桃園第三航廈｜機電工程施工日報
</header>


<div class="container">

<div id="loading" class="loading">Loading...</div>


<div class="card">

<div class="card-title">基本資料</div>

<input id="date" type="date">
<input id="reporter" placeholder="填報人">

<input id="area" placeholder="施工區域">

<textarea id="workItem" placeholder="今日施工項目"></textarea>

<textarea id="issue" placeholder="Issue"></textarea>

</div>



<div class="card">

<div class="card-title">人力</div>

<div class="grid">

<input id="directConstruction" type="number" placeholder="點工施工">
<input id="measuredConstruction" type="number" placeholder="計價施工">

<input id="directTransport" type="number" placeholder="點工運輸">
<input id="measuredTransport" type="number" placeholder="計價運輸">

<input id="directManagement" type="number" placeholder="點工管理">
<input id="measuredManagement" type="number" placeholder="計價管理">

<input id="directOther" type="number" placeholder="點工其他">
<input id="measuredOther" type="number" placeholder="計價其他">

</div>

<div class="grid">

<input id="workStart" type="time">
<input id="workEnd" type="time">

</div>

</div>



<div class="card">

<div class="card-title">加班</div>

<div class="grid">

<input id="otDirect" type="number" placeholder="點工">
<input id="otMeasured" type="number" placeholder="計價">

<input id="otStart" type="time">
<input id="otEnd" type="time">

</div>

</div>



<div class="card">

<div class="card-title">車輛 / 機具</div>

<div id="vehiclesWrap"></div>

<button id="addVehicleBtn">新增車輛</button>

</div>



<div class="card">

<div class="card-title">材料（自購）</div>

<div id="materialsWrap"></div>

<button id="addMaterialBtn">新增材料</button>

</div>



<button id="saveBtn">儲存</button>

<div id="formMsg" class="msg"></div>



<div class="card">

<div class="card-title">總覽查詢</div>

<input id="overviewDate" type="date">

<button id="overviewBtn">查詢</button>

<div id="overview" class="list"></div>

<div id="overviewMsg" class="msg"></div>

</div>


</div>



<script>

const API_URL="https://script.google.com/macros/s/AKfycbwvw1fyJ56kGHiPB_aupVxxoVTaUbd0QmX8EQnxrk7sgjgZaS65WPy3KmuFR_wWJhNh/exec";


const state={
saveBusy:false,
overviewBusy:false
};


function setLoading(v){

document.getElementById("loading")
.classList.toggle("show",v);

}


function setMsg(id,type,text){

const el=document.getElementById(id);

el.className="msg "+type+" show";

el.innerText=text;

}


function intVal(v){

const n=Number(v);

return isNaN(n)?0:n;

}



function vehicleTemplate(){

return `
<div class="vehicle-item">
<input class="vehicle-type" placeholder="車種">
<input class="vehicle-qty" type="number" placeholder="數量">
<input class="vehicle-workers" type="number" placeholder="作業人數">
<button class="delVehicle">刪除</button>
</div>
`;

}


function materialTemplate(){

return `
<div class="material-item">
<input class="material-name" placeholder="材料名稱">
<input class="material-spec" placeholder="規格">
<input class="material-unit" placeholder="單位">
<input class="material-qty" type="number" placeholder="數量">
<button class="delMaterial">刪除</button>
</div>
`;

}


function addVehicle(){

vehiclesWrap.insertAdjacentHTML(
"beforeend",
vehicleTemplate()
);

}


function addMaterial(){

materialsWrap.insertAdjacentHTML(
"beforeend",
materialTemplate()
);

}


function collectVehicles(){

return [...document.querySelectorAll(".vehicle-item")]

.map(v=>({

type:v.querySelector(".vehicle-type").value,

qty:intVal(v.querySelector(".vehicle-qty").value),

workers:intVal(v.querySelector(".vehicle-workers").value)

}))

.filter(v=>v.type);

}


function collectMaterials(){

return [...document.querySelectorAll(".material-item")]

.map(m=>({

name:m.querySelector(".material-name").value,

spec:m.querySelector(".material-spec").value,

unit:m.querySelector(".material-unit").value,

qty:intVal(m.querySelector(".material-qty").value)

}))

.filter(m=>m.name);

}



async function save(){

if(state.saveBusy)return;

state.saveBusy=true;

setLoading(true);


const payload={

action:"createReport",

date:date.value,

reporter:reporter.value,

area:area.value,

workItem:workItem.value,

issue:issue.value,

directConstruction:directConstruction.value,

directTransport:directTransport.value,

directManagement:directManagement.value,

directOther:directOther.value,

measuredConstruction:measuredConstruction.value,

measuredTransport:measuredTransport.value,

measuredManagement:measuredManagement.value,

measuredOther:measuredOther.value,

workStart:workStart.value,

workEnd:workEnd.value,

otDirect:otDirect.value,

otMeasured:otMeasured.value,

otStart:otStart.value,

otEnd:otEnd.value,

vehicles:JSON.stringify(collectVehicles()),

materials:JSON.stringify(collectMaterials())

};


try{

const res=await fetch(API_URL,{
method:"POST",
body:new URLSearchParams(payload)
});

const json=await res.json();

if(!json.ok){

if(json.message==="date_exists"){

const yes=confirm("已填過 是否覆蓋");

if(!yes)return;

payload.action="updateReport";

await fetch(API_URL,{
method:"POST",
body:new URLSearchParams(payload)
});

}

}

setMsg("formMsg","ok","儲存成功");

}catch(err){

setMsg("formMsg","err","儲存失敗");

}

state.saveBusy=false;

setLoading(false);

}



async function loadOverview(){

if(state.overviewBusy)return;

state.overviewBusy=true;

setLoading(true);

try{

const res=await fetch(
API_URL+
"?action=getReport&date="+
overviewDate.value
);

const json=await res.json();

if(!json.exists){

overview.innerHTML="無資料";

return;

}

const d=json.data;

overview.innerHTML=`
<div style="font-size:15px">

<b>日期</b>：${d.date}<br>
<b>填報人</b>：${d.reporter}<br>
<b>施工區域</b>：${d.area}<br><br>

<b>施工內容</b><br>
${d.workItem}<br><br>

<b>人力</b><br>
點工：${d.dailyDirectTotal} 人<br>
計價：${d.dailyMeasuredTotal} 人<br><br>

<b>累計</b><br>
點工：${d.cumDirectTotal} 人<br>
計價：${d.cumMeasuredTotal} 人

</div>
`;

}catch(err){

setMsg("overviewMsg","err","查詢失敗");

}

state.overviewBusy=false;

setLoading(false);

}



addVehicleBtn.onclick=addVehicle;
addMaterialBtn.onclick=addMaterial;

saveBtn.onclick=save;
overviewBtn.onclick=loadOverview;

</script>


</body>
</html>
