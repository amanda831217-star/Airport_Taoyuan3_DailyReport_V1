<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>桃三施工填報</title>
  <style>
    :root{
      --bg1:#cfe8ff;
      --bg2:#eef7ff;
      --card:rgba(255,255,255,.92);
      --line:rgba(148,163,184,.25);
      --text:#0f172a;
      --muted:#475569;
      --blue:#0f5cc0;
      --blue2:#1d4ed8;
      --sky:#8ed0ff;
      --light:#f8fbff;
      --danger:#dc2626;
      --ok:#16a34a;
      --warn:#f59e0b;
      --shadow:0 18px 45px rgba(15,23,42,.12);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:
        linear-gradient(180deg,#8fd1ff 0%, #d9f0ff 45%, #f4fbff 100%);
      min-height:100%;
    }

    body{
      max-width:820px;
      margin:0 auto;
      padding:14px 12px 34px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      min-height:210px;
      box-shadow:var(--shadow);
      background:
        linear-gradient(180deg,rgba(6,78,180,.28),rgba(255,255,255,.06)),
        url('./plane.jpg') center/cover no-repeat;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(9,41,87,.18),rgba(255,255,255,.02) 35%,rgba(255,255,255,.68) 100%);
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:18px 18px 22px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:210px;
    }

    .hero-badge{
      display:inline-flex;
      align-self:flex-start;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(10px);
      color:#0f3e86;
      font-size:12px;
      font-weight:900;
      letter-spacing:.5px;
    }

    .hero-title{
      font-size:28px;
      font-weight:900;
      line-height:1.15;
      color:#082e69;
      text-shadow:0 1px 0 rgba(255,255,255,.6);
      margin-top:8px;
    }

    .hero-sub{
      margin-top:8px;
      color:#123d78;
      font-size:13px;
      font-weight:700;
    }

    .top-tabs{
      display:flex;
      gap:10px;
      margin-top:14px;
    }

    .tab{
      flex:1;
      border:0;
      border-radius:16px;
      padding:13px 14px;
      font-size:15px;
      font-weight:900;
      color:#0f3e86;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 28px rgba(15,23,42,.08);
      cursor:pointer;
    }

    .tab.active{
      color:#fff;
      background:linear-gradient(135deg,#1d4ed8,#0f5cc0);
    }

    .page{
      display:none;
    }

    .page.active{
      display:block;
    }

    .card{
      margin-top:14px;
      background:var(--card);
      border:1px solid rgba(255,255,255,.5);
      backdrop-filter:blur(14px);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
    }

    .section-title{
      margin:0 0 12px;
      font-size:18px;
      font-weight:900;
      color:#08336b;
    }

    .section-sub{
      margin:-4px 0 12px;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .grid{
      display:grid;
      gap:12px;
    }

    .grid-2{
      grid-template-columns:1fr 1fr;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:900;
      color:#174076;
      margin:0 0 8px;
    }

    .field .en{
      color:#64748b;
      margin-left:5px;
      font-weight:700;
      font-size:12px;
    }

    input,textarea,select{
      width:100%;
      border:1px solid #dbeafe;
      background:rgba(255,255,255,.96);
      color:var(--text);
      border-radius:16px;
      padding:13px 14px;
      font-size:16px;
      outline:none;
      transition:.18s ease;
    }

    textarea{
      resize:vertical;
      min-height:92px;
    }

    input:focus,textarea:focus,select:focus{
      border-color:#60a5fa;
      box-shadow:0 0 0 4px rgba(59,130,246,.12);
    }

    input[readonly]{
      background:#edf6ff;
      color:#0f3e86;
      font-weight:800;
    }

    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .btn{
      border:0;
      border-radius:16px;
      padding:14px 16px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .btn-primary{
      color:#fff;
      background:linear-gradient(135deg,#2563eb,#0f5cc0);
      box-shadow:0 10px 25px rgba(37,99,235,.24);
    }

    .btn-soft{
      color:#0f3e86;
      background:#e0f2fe;
    }

    .btn-line{
      color:#174076;
      background:#fff;
      border:1px solid #dbeafe;
    }

    .btn-danger{
      color:#991b1b;
      background:#fee2e2;
    }

    .msg{
      display:none;
      margin-top:12px;
      border-radius:16px;
      padding:12px 14px;
      font-size:14px;
      font-weight:900;
    }

    .msg.show{
      display:block;
    }

    .msg.ok{
      background:#dcfce7;
      color:#166534;
    }

    .msg.err{
      background:#fee2e2;
      color:#991b1b;
    }

    .msg.info{
      background:#e0f2fe;
      color:#075985;
    }

    .row-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .mini{
      font-size:12px;
      color:#64748b;
      font-weight:700;
    }

    .repeat-item{
      border:1px solid #dbeafe;
      background:rgba(255,255,255,.88);
      border-radius:18px;
      padding:12px;
      margin-top:10px;
    }

    .repeat-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .repeat-title{
      font-size:13px;
      font-weight:900;
      color:#13407b;
    }

    .sticky-actions{
      position:sticky;
      bottom:10px;
      z-index:30;
      margin-top:16px;
      padding:10px;
      border-radius:22px;
      background:rgba(240,248,255,.88);
      backdrop-filter:blur(16px);
      box-shadow:0 14px 36px rgba(15,23,42,.08);
    }

    .sum-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .sum-box{
      padding:16px;
      border-radius:18px;
      background:linear-gradient(135deg,#ffffff,#edf6ff);
      border:1px solid #dbeafe;
    }

    .sum-label{
      font-size:12px;
      font-weight:900;
      color:#1751a6;
    }

    .sum-num{
      margin-top:6px;
      font-size:30px;
      font-weight:900;
      color:#082e69;
    }

    .overview-block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px dashed #bfdbfe;
    }

     .kv{
      display:grid;
      grid-template-columns:96px 1fr;
      gap:8px 12px;
      font-size:15px;
      line-height:1.55;
    }

    .k{
      color:#64748b;
      font-weight:900;
    }

    .v{
      color:#0f172a;
      font-weight:800;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .list-table{
      display:grid;
      gap:10px;
    }

    .list-row{
      display:grid;
      gap:8px;
      padding:12px;
      background:#fff;
      border-radius:16px;
      border:1px solid #dbeafe;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:5px 9px;
      border-radius:999px;
      background:#eff6ff;
      color:#1d4ed8;
      font-size:12px;
      font-weight:900;
    }

    .loading{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.5);
      backdrop-filter:blur(3px);
      z-index:999;
    }

    .loading.show{
      display:flex;
    }

    .loading-box{
      padding:16px 18px;
      border-radius:18px;
      background:#fff;
      box-shadow:var(--shadow);
      font-weight:900;
      color:#0f3e86;
    }

    @media (max-width:760px){
      .grid-2,
      .action-row,
      .sum-grid{
        grid-template-columns:1fr;
      }

      .hero-title{
        font-size:24px;
      }

      .kv{
        grid-template-columns:82px 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-box">處理中...</div>
  </div>

  <div class="hero">
    <div class="hero-content">
      <div class="hero-badge">TAOYUAN AIRPORT • DAILY REPORT</div>
      <div>
        <div class="hero-title">桃園地三航廈施工填報</div>
        <div class="hero-sub">飛機風格介面｜手機版操作｜可查詢｜可覆蓋更新</div>
      </div>
    </div>
  </div>

  <div class="top-tabs">
    <button class="tab active" data-page="formPage">填報</button>
    <button class="tab" data-page="overviewPage">總覽</button>
  </div>

  <section class="page active" id="formPage">
    <div class="card">
      <div class="section-title">基本資料</div>

      <div class="grid grid-2">
        <div class="field">
          <label>日期 <span class="en">Date</span></label>
          <input type="date" id="date">
        </div>
        <div class="field">
          <label>案場 <span class="en">Site</span></label>
          <input type="text" id="siteName" readonly>
        </div>
      </div>

      <div class="grid" style="margin-top:12px;">
        <div class="field">
          <label>填報人 <span class="en">Reporter</span></label>
          <input type="text" id="reporter" placeholder="請輸入填報人">
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-soft" id="loadBtn" type="button">載入當日資料</button>
        <button class="btn btn-line" id="newBtn" type="button">清空目前內容</button>
      </div>

      <div class="msg info" id="formMsg"></div>
    </div>

    <div class="card">
      <div class="section-title">施工資訊</div>

      <div class="grid">
        <div class="field">
          <label>區域 <span class="en">Area</span></label>
          <textarea id="area" placeholder="請輸入區域"></textarea>
        </div>

        <div class="field">
          <label>今日施工項目 <span class="en">Today's Work Item</span></label>
          <textarea id="workItem" placeholder="請輸入今日施工項目"></textarea>
        </div>

        <div class="field">
          <label>Issue <span class="en">Issue</span></label>
          <textarea id="issue" placeholder="請輸入 Issue"></textarea>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">人力</div>

      <div class="grid grid-2">
        <div class="field">
          <label>點工施工</label>
          <input type="number" id="directConstruction" value="0">
        </div>

        <div class="field">
          <label>計價施工</label>
          <input type="number" id="measuredConstruction" value="0">
        </div>

        <div class="field">
          <label>點工運輸</label>
          <input type="number" id="directTransport" value="0">
        </div>

        <div class="field">
          <label>計價運輸</label>
          <input type="number" id="measuredTransport" value="0">
        </div>

        <div class="field">
          <label>點工管理</label>
          <input type="number" id="directManagement" value="0">
        </div>

        <div class="field">
          <label>計價管理</label>
          <input type="number" id="measuredManagement" value="0">
        </div>

        <div class="field">
          <label>點工其它</label>
          <input type="number" id="directOther" value="0">
        </div>

        <div class="field">
          <label>計價其它</label>
          <input type="number" id="measuredOther" value="0">
        </div>
      </div>

      <div class="grid grid-2" style="margin-top:12px;">
        <div class="field">
          <label>出工時間</label>
          <input type="time" id="workStart">
        </div>

        <div class="field">
          <label>收工時間</label>
          <input type="time" id="workEnd">
        </div>
      </div>

      <div class="grid grid-2" style="margin-top:12px;">
        <div class="field">
          <label>加班點工人數</label>
          <input type="number" id="otDirect" value="0">
        </div>

        <div class="field">
          <label>加班計價人數</label>
          <input type="number" id="otMeasured" value="0">
        </div>

        <div class="field">
          <label>加班開始</label>
          <input type="time" id="otStart">
        </div>

        <div class="field">
          <label>加班結束</label>
          <input type="time" id="otEnd">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row-head">
        <div>
          <div class="section-title">車輛及機具</div>
          <div class="mini">車種 / 數量 / 作業人數</div>
        </div>
        <button class="btn btn-soft" id="addVehicleBtn">新增</button>
      </div>

      <div id="vehiclesWrap"></div>
    </div>

    <div class="card">
      <div class="row-head">
        <div>
          <div class="section-title">材料（自購）</div>
        </div>
        <button class="btn btn-soft" id="addMaterialBtn">新增</button>
      </div>

      <div id="materialsWrap"></div>
    </div>

    <div class="sticky-actions">
      <button class="btn btn-primary" id="saveBtn" type="button">儲存</button>
    </div>
      </section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwvw1fyJ56kGHiPB_aupVxxoVTaUbd0QmX8EQnxrk7sgjgZaS65WPy3KmuFR_wWJhNh/exec";

const $ = s => document.querySelector(s);

function vehicleRow(){

return `
<div class="repeat-item vehicle-item">

<input class="vehicle-type" placeholder="車種">

<input class="vehicle-qty" type="number" placeholder="數量">

<input class="vehicle-workers" type="number" placeholder="人數">

<button class="btn btn-danger del-vehicle">刪除</button>

</div>
`;

}

function materialRow(){

return `
<div class="repeat-item material-item">

<input class="material-name" placeholder="材料">

<input class="material-spec" placeholder="規格">

<input class="material-unit" placeholder="單位">

<input class="material-qty" type="number" placeholder="數量">

<button class="btn btn-danger del-material">刪除</button>

</div>
`;

}

$("#addVehicleBtn").onclick = ()=>{

$("#vehiclesWrap").insertAdjacentHTML("beforeend",vehicleRow())

}

$("#addMaterialBtn").onclick = ()=>{

$("#materialsWrap").insertAdjacentHTML("beforeend",materialRow())

}

document.addEventListener("click",e=>{

if(e.target.classList.contains("del-vehicle")){

e.target.closest(".vehicle-item").remove()

}

if(e.target.classList.contains("del-material")){

e.target.closest(".material-item").remove()

}

})

function collectVehicles(){

return [...document.querySelectorAll(".vehicle-item")].map(r=>({

type:r.querySelector(".vehicle-type").value,

qty:r.querySelector(".vehicle-qty").value,

workers:r.querySelector(".vehicle-workers").value

}))

}

function collectMaterials(){

return [...document.querySelectorAll(".material-item")].map(r=>({

name:r.querySelector(".material-name").value,

spec:r.querySelector(".material-spec").value,

unit:r.querySelector(".material-unit").value,

qty:r.querySelector(".material-qty").value

}))

}

async function save(){

const payload={

action:"saveReport",

date:$("#date").value,

reporter:$("#reporter").value,

area:$("#area").value,

workItem:$("#workItem").value,

issue:$("#issue").value,

directConstruction:$("#directConstruction").value,

directTransport:$("#directTransport").value,

directManagement:$("#directManagement").value,

directOther:$("#directOther").value,

measuredConstruction:$("#measuredConstruction").value,

measuredTransport:$("#measuredTransport").value,

measuredManagement:$("#measuredManagement").value,

measuredOther:$("#measuredOther").value,

workStart:$("#workStart").value,

workEnd:$("#workEnd").value,

otDirect:$("#otDirect").value,

otMeasured:$("#otMeasured").value,

otStart:$("#otStart").value,

otEnd:$("#otEnd").value,

vehicles:collectVehicles(),

materials:collectMaterials()

}

const body=new URLSearchParams()

Object.keys(payload).forEach(k=>{

body.append(k,typeof payload[k]==="object"?JSON.stringify(payload[k]):payload[k])

})

const res=await fetch(API_URL,{method:"POST",body})

const json=await res.json()

alert(json.message||"完成")

}

$("#saveBtn").onclick=save

</script>

</body>
</html>
